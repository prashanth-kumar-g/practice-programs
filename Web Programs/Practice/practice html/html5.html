<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h1> Registration Form </h1>

        <label for="name"> Name: </label>
        <input type="text" id="name" name="name"> <br><br>
        
        <label for="email"> Email: </label>
        <input type="email" id="email" name="email"> <br><br>
        
        <label for="password"> Password: </label>
        <input type="password" id="password" name="password"> <br><br>
        
        <label for="date"> Date of Birth: </label>
        <input type="date" id="date" name="date"> <br><br>

        <label for="gender"> Gender: </label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male"> Male </label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female"> Female </label> <br><br>

        <label for="course"> Select Course: </label>
        <select id="course" name="course">
            <option value="cs"> Computer Science </option>
            <option value="it"> Information Technology </option>
            <option value="ec"> Electronics </option>
        </select> <br><br>

        <label for="subjects"> Select Subjects: </label> <br>
        <input type="checkbox" id="math" name="subjects" value="math">
        <label for="math"> Mathematics </label> <br>
        <input type="checkbox" id="physics" name="subjects" value="physics">
        <label for="physics"> Physics </label> <br>
        <input type="checkbox" id="chemistry" name="subjects" value="chemistry">
        <label for="chemistry"> Chemistry </label> <br>
        <input type="checkbox" id="computer" name="subjects" value="computer">
        <label for="computer"> Computer Science </label> <br><br>

        <label for="address"> Address: </label> <br>
        <textarea id="address" name="address" rows="4" cols="50"> </textarea> <br><br>

        <input type="submit" value="Register">
    </form>
</body>
</html>
